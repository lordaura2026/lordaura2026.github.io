<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人情世故网</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div id="articles-container">
            <!-- 文章内容将通过JavaScript动态加载 -->
        </div>
        <nav class="pagination" aria-label="文章分页导航">
            <button class="page-btn prev" disabled>上一页</button>
            <span class="page-numbers"></span>
            <button class="page-btn next">下一页</button>
            <div class="jump-to">
                <input type="number" id="pageJump" min="1" placeholder="页码">
                <button id="goJump">跳转</button>
            </div>
        </nav>
    </div>
    <script src="scripts.js"></script>
</body>
</html>
