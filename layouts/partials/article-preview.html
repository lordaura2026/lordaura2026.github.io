<!-- article-preview.html -->
{{ $class := .class | default "article-item" }}
<article class="{{ $class }}">
  <h2 class="article-title"><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
  <div class="article-meta">
    <span>作者：www.人情世故.com</span>
    <span>{{ .Date.Format "2006年1月2日" }}</span>
  </div>
  <div class="article-excerpt">
    {{ .Summary | plainify | truncate 120 "…" }}
  </div>
  <a href="https://www.ok1v1.com" class="contact-link" target="_blank" rel="noopener noreferrer">联系本站</a>
</article>
