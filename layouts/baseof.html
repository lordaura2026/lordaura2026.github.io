<!DOCTYPE html> 
 <html lang="{{ .Site.LanguageCode | default "zh-CN" }}"> 
 <head> 
   <meta charset="UTF-8" /> 
   <meta name="viewport" content="width=device-width, initial-scale=1.0" /> 
   <title>{{ block "title" . }}{{ .Site.Title }}{{ end }}</title> 
   {{ $style := resources.Get "css/style.css" | minify }}
  <link rel="stylesheet" href="{{ $style.RelPermalink }}"> 
 </head> 
 <body> 
 <header class="site-header-fixed"> 
   <a href="/" class="site-title-link">
     <div class="site-logo">
       <div class="main-title">人情世故.com</div>
       <div class="sub-title">
         <span>Mastering Human Nature</span>
         <span class="crown">👑</span>
         <span>洞悉人性，上位有道</span>
       </div>
     </div>
   </a> 
 </header> 
 <style> 
 .site-header-fixed { 
   position: fixed; 
   top: 0; 
   left: 0; 
   right: 0; 
   background-color: #fff; /* 白色背景 */ 
   display: flex; 
   align-items: center; 
   justify-content: center; 
   padding: 16px; 
   box-sizing: border-box; 
   z-index: 1000; 
   border-bottom: 1px solid #eee; 
 } 
 .site-title-link { 
   text-decoration: none; 
   color: inherit; 
   -webkit-tap-highlight-color: transparent; 
 } 
 .site-logo { 
   text-align: center; 
 } 
 .main-title { 
   font-size: 24px; 
   font-weight: bold; 
   color: #0066cc; /* 深蓝色 */ 
   font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; 
   margin-bottom: 4px; 
 } 
 .sub-title { 
   font-size: 12px; 
   color: #666; 
   font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; 
   display: flex; 
   align-items: center; 
   justify-content: center; 
   gap: 8px; 
 } 
 .crown { 
   font-size: 14px; 
 } 
 /* 为下方内容预留顶部空间，避免被遮挡 */ 
 body { 
   padding-top: 80px; 
   margin: 0; 
 } 
 </style> 
   <div class="container"> 
     {{ block "main" . }}{{ end }} 
   </div> 
 </body> 
 </html>
