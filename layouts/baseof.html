<!DOCTYPE html> 
 <html lang="{{ .Site.LanguageCode | default "zh-CN" }}"> 
 <head> 
   <meta charset="UTF-8" /> 
   <meta name="viewport" content="width=device-width, initial-scale=1.0" /> 
   <title>{{ block "title" . }}{{ .Site.Title }}{{ end }}</title> 
   <style> 
     *{box-sizing:border-box;margin:0;padding:0} 
     body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:#fff;color:#333;line-height:1.75;font-size:16px} 
     .container{max-width:720px;margin:40px auto;padding:0 24px} 
     .article-item{background:#fafafa;border-radius:8px;padding:24px;margin-bottom:32px;position:relative;overflow:hidden} 
     .article-title{font-size:1.4em;margin:0 0 12px;color:#1a1a1a} 
     .article-meta{color:#666;font-size:0.95em;margin:0 0 18px;display:flex;gap:16px;flex-wrap:wrap;align-items:center} 
     .article-content{font-size:1.05em;word-spacing:0.05em} 
     .article-content p{margin:18px 0;text-align:justify} 
     .contact-link{ 
       position:absolute; 
       top:16px; 
       right:16px; 
       color:#d32f2f; 
       font-weight:600; 
       font-size:0.95em; 
       text-decoration:underline; 
       background:#fff8f8; 
       padding:4px 8px; 
       border-radius:4px; 
       z-index:1 
     } 
     .pagination{ 
       display:flex; 
       align-items:center; 
       justify-content:center; 
       gap:8px; 
       margin:48px 0; 
       flex-wrap:wrap 
     } 
     .page-btn{ 
       padding:6px 12px; 
       border:1px solid #ddd; 
       background:#fff; 
       cursor:pointer; 
       min-width:32px; 
       text-align:center; 
       transition:background 0.2s 
     } 
     .page-btn:hover,.page-btn.active{ 
       background:#f0f0f0; 
       text-decoration:none 
     } 
     .jump-to{ 
       display:flex; 
       align-items:center; 
       gap:6px; 
       margin-left:12px 
     } 
     .jump-to input{ 
       width:60px; 
       padding:4px; 
       border:1px solid #ccc; 
       font-size:14px; 
       text-align:center 
     } 
     .jump-to button{ 
       padding:4px 10px; 
       background:#f5f5f5; 
       border:1px solid #ddd; 
       cursor:pointer; 
       font-size:14px; 
       transition:background 0.2s 
     } 
     .jump-to button:hover{ 
       background:#e0e0e0 
     } 
     @media (max-width:768px){ 
       .container{padding:0 16px;margin:24px auto} 
       .article-item{padding:20px} 
       .contact-link{position:static;margin-top:16px;text-align:right;background:transparent;padding:0} 
     } 
   </style> 
 </head> 
 <body> 
   <div class="container"> 
     {{ block "main" . }}{{ end }} 
   </div> 
 </body> 
 </html>
