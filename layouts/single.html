{{ define "title" }}{{ .Title }} - {{ .Site.Title }}{{ end }}

{{ define "main" }}
<a href="/" class="contact-link" style="position: static; margin-bottom: 24px; display: inline-block;">返回首页</a>

<div class="article-item">
  <h1 class="article-title">{{ .Title }}</h1>
  <div class="article-meta">
    <span>作者：www.人情世故.com</span>
    <span>{{ .Date.Format "2006年1月" }}</span>
  </div>
  <div class="article-content">
    {{ .Content }}
    <!-- 在文章末尾添加联系链接 -->
    <a href="https://www.ok1v1.com" class="contact-link" target="_blank" rel="noopener noreferrer">联系本站</a>
  </div>
</div>

{{ partial "related-posts.html" . }}
{{ end }}
